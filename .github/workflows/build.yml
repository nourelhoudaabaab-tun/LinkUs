name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libffi-dev \
            libssl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5
      
      - name: Install buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = LinkUs
package.name = linkus
package.domain = org.linkus
source.dir = .
version = 1.0.0
requirements = python3,kivy==2.2.1,opencv-python,mediapipe,numpy
android.permissions = CAMERA, INTERNET
android.api = 30
android.minapi = 21
android.ndk = 23c
android.sdk = 30
android.orientation = portrait
android.wakelock = True
fullscreen = 0
window.size = 400, 700

[buildozer]
log_level = 2
warn_on_root = 1
EOF
      
      - name: Build APK
        run: |
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: LinkUs-APK
          path: bin/*.apk
