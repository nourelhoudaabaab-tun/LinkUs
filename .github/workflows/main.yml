name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install buildozer
        run: |
          pip install buildozer
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk
          
      - name: Build APK
        run: |
          buildozer init
          sed -i 's/title = .*/title = LinkUs/' buildozer.spec
          sed -i 's/package.name = .*/package.name = linkus/' buildozer.spec
          sed -i 's/android.permissions = .*/android.permissions = CAMERA/' buildozer.spec
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LinkUs-APK
          path: bin/*.apk
